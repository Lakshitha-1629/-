<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NoMercy-MD Cyber Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body{
 margin:0;
 background:black;
 font-family:'Share Tech Mono', monospace;
 color:#00ff9f;
 overflow:hidden;
}
canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:-1;
}
#logo{
 position:absolute;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 width:120px;
 animation:logoGlow 2s infinite alternate;
}
@keyframes logoGlow{
 0%{filter:drop-shadow(0 0 5px #0f0);}
 100%{filter:drop-shadow(0 0 20px #0f0);}
}
.box{
 position:absolute;
 top:100px;
 left:50%;
 transform:translateX(-50%);
 width:600px;
 background:rgba(0,0,0,0.85);
 border:1px solid #00ff9f;
 box-shadow:0 0 30px #00ff9f;
 padding:20px;
}
h2{
 text-align:center;
}
input, button{
 font-family:'Share Tech Mono', monospace;
}
input{
 width:70%;
 padding:10px;
 margin-right:5px;
 background:black;
 color:#0f0;
 border:1px solid #0f0;
}
button{
 padding:10px;
 background:#0f0;
 border:none;
 cursor:pointer;
 font-weight:bold;
}
button:hover{
 box-shadow:0 0 10px #0f0;
}
#progressContainer{
 width:100%;
 background:#001a00;
 height:15px;
 margin-top:10px;
}
#progressBar{
 width:0%;
 height:15px;
 background:#0f0;
}
#logs{
 background:black;
 border:1px solid #0f0;
 height:150px;
 overflow-y:scroll;
 padding:10px;
 margin-top:10px;
}
#status,#cpu,#users,#ip,#code{
 margin-top:10px;
}
</style>
</head>
<body>

<img id="logo" src="https://github.com/Lakshitha-1629/1629/blob/main/logo/NoMercy.png?raw=true">

<div class="box">
<h2>💀 NoMercy-MD Cyber Dashboard 💀</h2>
<input type="number" id="number" placeholder="+947XXXXXXXX">
<button id="link">PAIR</button>

<div id="progressContainer"><div id="progressBar"></div></div>

<div id="status">Server: CONNECTING...</div>
<div id="users">Online Users: 0</div>
<div id="cpu">CPU: 0% | RAM: 0%</div>
<div id="ip">IP: 0.0.0.0</div>
<div id="code"></div>
<div id="logs"></div>
</div>

<audio id="hackSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
// MATRIX 3D background
let c=document.createElement('canvas');
c.id="matrix";
document.body.appendChild(c);
let ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;
let letters="01";
letters=letters.split("");
let font=14;
let columns=c.width/font;
let drops=[];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
 ctx.fillStyle="rgba(0,0,0,0.05)";
 ctx.fillRect(0,0,c.width,c.height);
 ctx.fillStyle="#0f0";
 ctx.font=font+"px monospace";
 for(let i=0;i<drops.length;i++){
   let text=letters[Math.floor(Math.random()*letters.length)];
   ctx.fillText(text,i*font,drops[i]*font);
   if(drops[i]*font>c.height && Math.random()>0.975) drops[i]=0;
   drops[i]++;
 }
}
setInterval(draw,33);

// BOT DASHBOARD LOGIC
let btn=document.getElementById("link");
let input=document.getElementById("number");
let progress=document.getElementById("progressBar");
let status=document.getElementById("status");
let users=document.getElementById("users");
let cpu=document.getElementById("cpu");
let ip=document.getElementById("ip");
let code=document.getElementById("code");
let logs=document.getElementById("logs");
let beep=document.getElementById("hackSound");

function addLog(text){
 let p=document.createElement('div');
 p.innerText=text;
 logs.appendChild(p);
 logs.scrollTop=logs.scrollHeight;
}

function fakeStats(){
 let cpuVal=Math.floor(Math.random()*100);
 let ramVal=Math.floor(Math.random()*100);
 cpu.innerText=`CPU: ${cpuVal}% | RAM: ${ramVal}%`;
 users.innerText=`Online Users: ${Math.floor(Math.random()*500)}`;
 ip.innerText=`IP: 192.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
 addLog(`[BOT] Stats Updated`);
}

setInterval(fakeStats,2000);

btn.onclick=async()=>{
 beep.play();
 addLog(`[BOT] Pairing process started...`);
 let i=0;
 let fake=setInterval(()=>{
   i++;
   progress.style.width=i+"%";
   if(i==20) addLog("[BOT] Bypassing firewall...");
   if(i==50) addLog("[BOT] Injecting payload...");
   if(i==80) addLog("[BOT] Decrypting session...");
   if(i>=100){
     clearInterval(fake);
     addLog("[BOT] Server ONLINE ✅");
   }
 },50);

 let num=input.value.replace(/[^0-9]/g,'');
 try{
   let {data}=await axios(`/code?number=${num}`);
   code.innerHTML="PAIR CODE: <b>"+data.code+"</b>";
   addLog(`[BOT] Pair code received`);
 }catch{
   code.innerHTML="❗ ERROR FETCHING CODE";
   addLog(`[BOT] Failed to fetch code`);
 }
}
</script>
</body>
</html>
